<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="منصة أكاديمية الفقه والتفقه الإسلامي - تعليم شرعي غير ربحي">
<title>أكاديمية الفقه والتفقه الإسلامي</title>

<style>
/* ===================== ROOT VARIABLES ===================== */
:root {
  --primary: #1a5f3c;
  --primary-light: #2ecc71;
  --primary-dark: #14532d;
  --secondary: #0f3460;
  --accent: #e8b923;
  --gold: #c8a951;
  --text: #1f2937;
  --text-light: #6b7280;
  --bg: #f8fafc;
  --bg-dark: #1a1a2e;
  --white: #ffffff;
  --shadow: 0 10px 40px rgba(0,0,0,0.1);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
  --radius: 16px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

/* ===================== ANIMATIONS ===================== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
  50% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.6); }
}

@keyframes countUp {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.animate { animation: fadeInUp 0.8s ease forwards; opacity: 0; }
.animate-delay-1 { animation-delay: 0.1s; }
.animate-delay-2 { animation-delay: 0.2s; }
.animate-delay-3 { animation-delay: 0.3s; }
.animate-delay-4 { animation-delay: 0.4s; }

/* ===================== NAVBAR ===================== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,0,0,0.05);
  padding: 0 24px;
  transition: var(--transition);
}

.navbar.scrolled {
  box-shadow: var(--shadow);
}

.navbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 70px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
}

.nav-links {
  display: flex;
  gap: 8px;
  align-items: center;
}

.nav-link {
  padding: 8px 16px;
  border-radius: 8px;
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
}

.nav-link:hover {
  background: rgba(26, 95, 60, 0.08);
  color: var(--primary);
}

.nav-btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white !important;
  padding: 10px 20px !important;
  border-radius: 50px !important;
  font-weight: 600;
}

.nav-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(26, 95, 60, 0.3);
}

.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--text);
}

/* ===================== HERO SECTION ===================== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 100px 24px 60px;
  background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #d1fae5 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(46, 204, 113, 0.1) 0%, transparent 70%);
  border-radius: 50%;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(232, 185, 35, 0.1) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-content {
  max-width: 800px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26, 95, 60, 0.1);
  color: var(--primary);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  animation: fadeIn 0.6s ease;
}

.hero h1 {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800;
  color: var(--primary-dark);
  line-height: 1.3;
  margin-bottom: 20px;
}

.hero h1 span {
  color: var(--primary-light);
  position: relative;
}

.hero p {
  font-size: 18px;
  color: var(--text-light);
  max-width: 600px;
  margin: 0 auto 32px;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 14px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: var(--transition);
  cursor: pointer;
  border: none;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 15px rgba(26, 95, 60, 0.3);
  animation: pulse-glow 2s infinite;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(26, 95, 60, 0.4);
}

.btn-secondary {
  background: white;
  color: var(--primary);
  border: 2px solid var(--primary);
}

.btn-secondary:hover {
  background: var(--primary);
  color: white;
  transform: translateY(-3px);
}

/* ===================== STATS BAR ===================== */
.stats-bar {
  background: white;
  padding: 40px 24px;
  position: relative;
  z-index: 2;
}

.stats-inner {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 24px;
  text-align: center;
}

.stat-item h4 {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 4px;
}

.stat-item p {
  font-size: 13px;
  color: var(--text-light);
}

/* ===================== SECTIONS ===================== */
.section {
  padding: 80px 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 48px;
}

.section-header h2 {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary-dark);
  margin-bottom: 12px;
}

.section-header p {
  color: var(--text-light);
  max-width: 500px;
  margin: 0 auto;
}

/* ===================== FEATURES ===================== */
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.feature-card {
  background: white;
  padding: 32px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: var(--transition);
  text-align: center;
  border: 1px solid rgba(0,0,0,0.05);
}

.feature-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-lg);
}

.feature-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin: 0 auto 20px;
}

.feature-icon.green { background: #e8f5e9; }
.feature-icon.blue { background: #e3f2fd; }
.feature-icon.orange { background: #fff3e0; }
.feature-icon.purple { background: #f3e5f5; }
.feature-icon.red { background: #ffebee; }
.feature-icon.teal { background: #e0f2f1; }

.feature-card h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}

.feature-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

.feature-card .btn-link {
  display: inline-block;
  margin-top: 16px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  transition: var(--transition);
}

.feature-card .btn-link:hover {
  color: var(--primary-dark);
  transform: translateX(-4px);
}

/* ===================== VISION & MESSAGE ===================== */
.vision-section {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  color: white;
  padding: 80px 24px;
  position: relative;
  overflow: hidden;
}

.vision-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.vision-inner {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 40px;
  position: relative;
  z-index: 1;
}

.vision-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 32px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.2);
}

.vision-box h3 {
  font-size: 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.vision-box p, .vision-box li {
  font-size: 14px;
  line-height: 1.8;
  opacity: 0.9;
}

.vision-box ul {
  padding-right: 20px;
  margin-top: 12px;
}

.vision-box li {
  margin-bottom: 8px;
}

/* ===================== SHARE SECTION ===================== */
.share-section {
  background: white;
  padding: 60px 24px;
  text-align: center;
}

.share-section h3 {
  font-size: 20px;
  margin-bottom: 24px;
  color: var(--text);
}

.share-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.share-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  text-decoration: none;
  color: white;
  transition: var(--transition);
  border: none;
  cursor: pointer;
}

.share-btn:hover {
  transform: translateY(-4px) scale(1.1);
}

.share-btn.wa { background: #25d366; }
.share-btn.tg { background: #0088cc; }
.share-btn.fb { background: #1877f2; }
.share-btn.x { background: #000000; }
.share-btn.link { background: var(--primary); }
